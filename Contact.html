<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200">

  <nav class="bg-[#00000c] text-white p-4 w-full flex space-x-6 font-semibold">
    <a href="index.html" class="hover:text-blue-400 transition">Homepage</a>
    <a href="aboutMe.html" class="hover:text-blue-400 transition">About Me</a>
    <a href="Activities.html" class="hover:text-blue-400 transition">Activities</a>
    <a href="Contact.html" class="hover:text-blue-400 transition">Contact</a>
  </nav>

<header class="bg-[#00000c] text-white flex flex-col md:flex-row items-center justify-between px-6 lg:px-20 py-10 md:h-[300px]">

  <!-- TEXT -->
  <div class="space-y-2 text-center md:text-left">
    <h1 class="text-4xl md:text-7xl font-bold">
      Contact
    </h1>
  </div>

  <!-- IMAGE -->
  <div class="mt-6 md:mt-0 flex justify-center md:justify-end">
    <img 
      src="images/my image.png" 
      alt="Ayan" 
      class="h-[200px] w-[200px] md:h-[300px] md:w-[300px] object-cover rounded-lg"
    >
  </div>

</header>

  <!-- My Contact Details Section -->
  <div class="flex bg-white p-10 border-b-[5px] border-[#91b0be]">
    <!-- Bam pashe icon -->
    <div class="w-[10%]">
      <img src="images/replacement.jfif" alt="Icon" class="w-[70px] h-auto rounded-full p-2">
    </div>

    <!-- Dan pashe welcome note content -->
    <div class="w-[90%] pl-8">
      <h2 class="text-2xl font-bold mb-4 text-gray-800">Get in Touch!</h2>
      <div class="space-y-4">
        <!-- Email -->
        <div class="flex items-center gap-2">
          <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          </div>
          <span class="font-semibold text-gray-700">Email: md.rashidayan@gmail.com</span>
        </div>
        <!-- Phone -->
        <div class="flex items-center gap-2">
          <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </div>
          <span class="font-semibold text-gray-700">Phone: +1 234 567 890</span>
        </div>
        <!-- Location -->
        <div class="flex items-center gap-2">
          <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <span class="font-semibold text-gray-700 text-sm">Uttara, Dhaka, Bangladesh</span>
        </div>
        <!-- Facebook -->
        <div class="flex items-center gap-2">
          <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
          </div>
          <a href="https://www.facebook.com/rashid.ayan.723556" class="font-semibold text-blue-600 hover:underline">facebook.com/rashid.ayan.723556</a>
        </div>
        <!-- LinkedIn -->
        <div class="flex items-center gap-2">
          <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center text-white shrink-0">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
          </div>
          <a href="https://www.linkedin.com/in/rashid-ayan-486921390/" class="font-semibold text-blue-600 hover:underline">linkedin.com/in/rashid-ayan-486921390</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Contact Form Section -->
  <div class="bg-gray-100 py-10">
    <div class="w-[90%] mx-auto bg-white p-8 rounded-lg shadow-md">
      <h2 class="text-3xl font-bold text-gray-800 mb-6 border-b-4 border-blue-500 inline-block">📩 Send me a Message</h2>
      <form class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-gray-700 font-bold mb-1">Name</label>
            <input type="text" placeholder="Your Name" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
          <div>
            <label class="block text-gray-700 font-bold mb-1">Email</label>
            <input type="email" placeholder="Your Email" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
          </div>
        </div>
        <div>
          <label class="block text-gray-700 font-bold mb-1">Mobile Number</label>
          <input type="text" placeholder="Your Mobile Number" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-gray-700 font-bold mb-1">Message</label>
          <textarea rows="5" placeholder="Write your comment here" class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
        <div class="flex gap-4">
          <button type="submit" class="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-700 transition">Submit</button>
          <button type="reset" class="bg-gray-300 text-gray-700 px-8 py-3 rounded-lg font-bold hover:bg-gray-400 transition">Reset</button>
        </div>
      </form>
    </div>
  </div>
  <footer class="bg-slate-900 text-white text-center p-6 border-t-4 border-blue-600">
    Made by Rashid Ayan
  </footer>


</body>
</html>
